<svg width="100%" viewBox="0 0 680 680" role="img" xmlns="http://www.w3.org/2000/svg" style="">
  <title style="fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">Icône SOFT TRANSIT – Système de gestion de transit SST</title>
  <desc style="fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">Icône carrée aux coins arrondis, fond bleu marine SST, représentant un conteneur maritime avec des vagues et des dossiers stylisés, dans la charte graphique de Soft Services Technologiques.</desc>
  <defs>
    <clipPath id="roundClip">
      <rect x="40" y="40" width="600" height="600" rx="90"/>
    </clipPath>
  </defs>

  <!-- Fond bleu marine SST -->
