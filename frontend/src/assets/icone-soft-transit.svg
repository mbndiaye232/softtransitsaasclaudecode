    <!-- Vagues stylisées en bas -->
    <path d="M40 560 Q170 520 300 555 Q430 590 640 545 L640 640 L40 640 Z" fill="#152B4E" style="fill:rgb(21, 43, 78);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <path d="M40 590 Q170 555 300 580 Q430 610 640 575 L640 640 L40 640 Z" fill="#0E1F38" style="fill:rgb(14, 31, 56);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

    <!-- Conteneur maritime principal -->
    <!-- Corps du conteneur -->
    <rect x="130" y="220" width="420" height="240" rx="12" fill="#FFFFFF" opacity="0.96" style="fill:rgb(255, 255, 255);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.96;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <!-- Toit légèrement plus sombre -->
